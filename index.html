<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F5F4F0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MindFrame">
<title>MindFrame</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* === RESET === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* === TOKENS === */
:root{
  --bg:#F5F4F0;
  --surface:#FFFFFF;
  --surface-2:#EDECEA;
  --ink:#111111;
  --ink-muted:#6B6B6B;
  --ink-faint:#B0ADA8;
  --accent:#3B00F0;
  --accent-dim:rgba(59,0,240,.08);
  --accent-text:#2800A8;
  --correct:#006644;
  --correct-bg:#E6F7F0;
  --wrong:#B91C1C;
  --wrong-bg:#FEE2E2;
  --mission:#6D28D9;
  --mission-bg:rgba(109,40,217,.07);
  --border:#DDD9D0;
  --border-light:#EDECEA;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04);
  --shadow-sm:0 1px 2px rgba(0,0,0,.06);
  --r:10px;
  --r-sm:6px;
  --r-lg:16px;
  --fd:'Fraunces',Georgia,serif;
  --fu:'Inter',-apple-system,system-ui,sans-serif;
  --sidebar:240px;
  --max-w:680px;
  --bn-h:64px;
  --t:.18s ease;
}

/* === BASE === */
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--fu);background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100dvh}
button{cursor:pointer;border:none;background:none;font-family:var(--fu);color:inherit}
a{color:var(--accent-text)}
img{max-width:100%;display:block}

/* Focus — WCAG AA */
:focus-visible{outline:3px solid var(--accent);outline-offset:2px;border-radius:var(--r-sm)}

/* Reduced motion */
@media(prefers-reduced-motion:reduce){*,*::before,*::after{transition-duration:.01ms!important;animation-duration:.01ms!important}}

/* === LAYOUT === */
#app{display:flex;min-height:100dvh}

/* Sidebar */
.sidebar{display:none;width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);flex-direction:column;padding:24px 16px;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto}
@media(min-width:768px){.sidebar{display:flex}}

.sidebar-logo{font-family:var(--fd);font-size:20px;font-weight:600;color:var(--ink);padding:8px 12px 28px;letter-spacing:-.02em}

.sidebar-nav{display:flex;flex-direction:column;gap:2px;flex:1}

.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r-sm);font-size:14px;font-weight:500;color:var(--ink-muted);transition:background var(--t),color var(--t);text-align:left;width:100%;min-height:44px}
.nav-btn:hover{background:var(--surface-2);color:var(--ink)}
.nav-btn.active{background:var(--accent-dim);color:var(--accent-text);font-weight:600}
.nav-icon{font-size:17px;width:22px;text-align:center;flex-shrink:0}

.sidebar-footer{border-top:1px solid var(--border);padding-top:16px;margin-top:8px}

.lang-row{display:flex;gap:6px}
.lang-btn{flex:1;padding:7px 8px;border-radius:var(--r-sm);font-size:13px;font-weight:500;color:var(--ink-muted);border:1.5px solid var(--border);transition:all var(--t);min-height:36px}
.lang-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Main */
.main-wrap{flex:1;padding-bottom:var(--bn-h);min-width:0}
@media(min-width:768px){.main-wrap{margin-left:var(--sidebar);padding-bottom:40px}}

/* Reading progress bar */
.reading-bar{position:fixed;top:0;left:0;right:0;height:3px;background:var(--accent);transform-origin:left;transform:scaleX(0);transition:transform .1s linear;z-index:200;display:none}
@media(min-width:768px){.reading-bar{left:var(--sidebar)}}

/* Views */
.view{display:none;max-width:var(--max-w);margin:0 auto;padding:24px 16px;min-height:calc(100dvh - var(--bn-h))}
@media(min-width:768px){.view{padding:40px 32px;min-height:100vh}}
.view.active{display:block}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--bn-h);background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:0 8px;padding-bottom:env(safe-area-inset-bottom);z-index:100}
@media(min-width:768px){.bottom-nav{display:none}}

.bn-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 16px;border-radius:var(--r-sm);color:var(--ink-muted);font-size:11px;font-weight:500;transition:color var(--t);min-width:56px;min-height:44px;justify-content:center}
.bn-btn.active{color:var(--accent)}
.bn-icon{font-size:20px;line-height:1}

/* === SHARED COMPONENTS === */

/* Heading */
.view-h{font-family:var(--fd);font-size:28px;font-weight:400;color:var(--ink);margin-bottom:24px;letter-spacing:-.02em;line-height:1.2}

/* Section label */
.sec-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-faint);margin-bottom:14px}

/* Back button */
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:500;color:var(--ink-muted);padding:8px 0;min-height:44px;transition:color var(--t)}
.back-btn:hover{color:var(--ink)}

/* Buttons */
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:#fff;border-radius:var(--r);padding:13px 22px;font-size:14px;font-weight:600;transition:background var(--t),transform var(--t);min-height:48px;line-height:1}
.btn-primary:hover{background:#2a2a2a;transform:translateY(-1px)}
.btn-secondary{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--ink);border:1.5px solid var(--border);border-radius:var(--r);padding:13px 22px;font-size:14px;font-weight:500;transition:border-color var(--t),background var(--t);min-height:48px;line-height:1}
.btn-secondary:hover{border-color:var(--ink);background:var(--surface)}
.btn-danger{border-color:var(--wrong);color:var(--wrong)}
.btn-danger:hover{background:var(--wrong-bg)}

/* Difficulty dots */
.diff-dots{display:inline-flex;gap:3px;align-items:center;vertical-align:middle}
.diff-dot{width:6px;height:6px;border-radius:50%;background:var(--border)}
.diff-dot.on{background:var(--ink-muted)}

/* Progress bar */
.prog-bar{width:100%;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}

/* Card base */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r)}

/* Toast */
.toast{position:fixed;bottom:calc(var(--bn-h) + 16px);left:50%;transform:translateX(-50%) translateY(12px);background:var(--ink);color:#fff;padding:9px 20px;border-radius:999px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:999;white-space:nowrap;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:768px){.toast{bottom:24px}}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--ink-muted);font-size:14px;gap:10px}
.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--ink-muted)}
.empty-icon{font-size:48px;margin-bottom:16px;line-height:1}
.empty-title{font-size:17px;font-weight:600;color:var(--ink);margin-bottom:8px}
.empty-desc{font-size:14px;line-height:1.55}

/* Input */
.input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;font-family:var(--fu);color:var(--ink);background:var(--bg);transition:border-color var(--t);min-height:44px}
.input:focus{outline:none;border-color:var(--accent)}
.input:focus-visible{outline:3px solid var(--accent);outline-offset:1px}

/* === HOME VIEW === */
.home-header{margin-bottom:28px}
.home-greeting{font-family:var(--fd);font-size:27px;font-weight:400;line-height:1.25;margin-bottom:4px}
.home-sub{font-size:14px;color:var(--ink-muted);margin-bottom:14px}

.streak-chip{display:inline-flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:5px 13px;font-size:13px;font-weight:500;color:var(--ink-muted)}

/* Continue card */
.continue-card{display:flex;align-items:center;justify-content:space-between;gap:16px;background:var(--ink);color:#fff;border-radius:var(--r-lg);padding:20px;margin-bottom:28px;cursor:pointer;transition:transform var(--t),box-shadow var(--t);text-align:left;width:100%}
.continue-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.15)}
.continue-card:focus-visible{outline:3px solid var(--accent);outline-offset:3px}
.cc-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;opacity:.55;margin-bottom:5px}
.cc-title{font-family:var(--fd);font-size:18px;font-weight:400;line-height:1.3;margin-bottom:8px}
.cc-meta{font-size:13px;opacity:.65;display:flex;gap:8px;flex-wrap:wrap}
.cc-arrow{font-size:22px;flex-shrink:0;opacity:.75}

/* Module grid */
.mod-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:8px}
@media(min-width:480px){.mod-grid{grid-template-columns:1fr 1fr}}

.mod-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:border-color var(--t),box-shadow var(--t);text-align:left;display:flex;flex-direction:column;gap:8px;min-height:44px}
.mod-card:hover{border-color:var(--accent);box-shadow:var(--shadow-sm)}
.mod-card.locked{opacity:.42;cursor:not-allowed;pointer-events:none}
.mod-icon{font-size:26px;line-height:1}
.mod-title{font-size:14px;font-weight:600;color:var(--ink);line-height:1.3}
.mod-meta{font-size:12px;color:var(--ink-muted)}

/* === MODULE VIEW === */
.mod-header{margin-bottom:28px}
.mod-icon-lg{font-size:40px;line-height:1;margin-bottom:12px}
.mod-title-lg{font-family:var(--fd);font-size:30px;font-weight:400;color:var(--ink);margin-bottom:8px;letter-spacing:-.02em;line-height:1.2}
.mod-desc{font-size:15px;color:var(--ink-muted);line-height:1.55}

.lesson-list{display:flex;flex-direction:column;gap:8px}

.lesson-item{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:border-color var(--t);text-align:left;width:100%;min-height:64px}
.lesson-item:hover{border-color:var(--accent)}
.lesson-item.done{background:var(--correct-bg);border-color:#B3E0D0}

.l-num{width:28px;height:28px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--ink-muted);flex-shrink:0}
.lesson-item.done .l-num{background:var(--correct);color:#fff}

.l-info{flex:1;min-width:0}
.l-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:3px}
.l-meta{font-size:12px;color:var(--ink-muted);display:flex;gap:8px;flex-wrap:wrap;align-items:center}

.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:2px 7px;border-radius:999px;background:var(--accent-dim);color:var(--accent-text)}
.badge.green{background:var(--correct-bg);color:var(--correct)}
.badge.purple{background:var(--mission-bg);color:var(--mission)}

/* === LESSON VIEW === */
.lesson-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.lesson-breadcrumb{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--accent-text)}
.lesson-counter{font-size:12px;color:var(--ink-muted)}

.lesson-title{font-family:var(--fd);font-size:30px;font-weight:400;color:var(--ink);line-height:1.2;letter-spacing:-.02em;margin-bottom:12px}
@media(min-width:520px){.lesson-title{font-size:36px}}

.lesson-summary{font-family:var(--fd);font-size:17px;font-weight:300;color:var(--ink-muted);line-height:1.65;margin-bottom:22px;font-style:italic}

.lesson-meta-bar{display:flex;gap:16px;align-items:center;padding:12px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:32px;flex-wrap:wrap}
.l-meta-item{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--ink-muted)}

.lesson-body{font-family:var(--fd);font-size:17px;font-weight:300;line-height:1.8;color:var(--ink)}
.lesson-body p{margin-bottom:20px}
.lesson-body p:last-child{margin-bottom:0}

/* Lesson section divider */
.l-section{margin-top:36px;padding-top:36px;border-top:1px solid var(--border)}

/* Example */
.example-card{background:var(--surface-2);border-radius:var(--r);padding:20px;border-left:3px solid var(--ink)}
.example-title{font-weight:600;font-size:14px;margin-bottom:10px;color:var(--ink)}
.example-body{font-size:14px;line-height:1.65;color:var(--ink-muted)}

/* Reference */
.ref-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;font-size:13px;line-height:1.5}
.ref-author{font-weight:600;color:var(--ink);margin-bottom:2px}
.ref-title{font-style:italic;color:var(--ink-muted);margin-bottom:4px}
.ref-note{font-size:12px;color:var(--ink-faint)}

/* Field Mission */
.mission-card{background:var(--mission-bg);border:1.5px solid rgba(109,40,217,.18);border-radius:var(--r);padding:20px}
.mission-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.mission-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--mission);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px;transition:background var(--t),border-color var(--t);background:#fff}
.mission-check:focus-visible{outline:3px solid var(--mission);outline-offset:2px}
.mission-check.done{background:var(--mission);border-color:var(--mission)}
.mission-check.done::after{content:'✓';color:#fff;font-size:13px;font-weight:700}
.mission-check-title{font-weight:600;font-size:15px;color:var(--mission);line-height:1.3}
.mission-desc{font-size:14px;line-height:1.65;color:var(--ink-muted);padding-left:34px}

/* Lesson CTA */
.lesson-cta{margin-top:40px;padding-top:32px;border-top:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap}

/* === QUIZ VIEW === */
.quiz-back{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.quiz-prog-bar{width:100%;height:4px;background:var(--border);border-radius:2px;margin-bottom:10px;overflow:hidden}
.quiz-prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s ease}
.quiz-counter{font-size:12px;color:var(--ink-muted);font-weight:500}

.quiz-q{font-family:var(--fd);font-size:22px;font-weight:400;line-height:1.4;color:var(--ink);margin-bottom:24px;letter-spacing:-.01em}

.quiz-options{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.quiz-opt{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:14px 16px;font-size:14px;font-weight:500;color:var(--ink);text-align:left;cursor:pointer;transition:border-color var(--t),background var(--t);line-height:1.45;min-height:52px;width:100%}
.quiz-opt:hover:not(:disabled){border-color:var(--accent);background:var(--accent-dim)}
.quiz-opt.correct{border-color:var(--correct);background:var(--correct-bg);color:var(--correct)}
.quiz-opt.wrong{border-color:var(--wrong);background:var(--wrong-bg);color:var(--wrong)}
.quiz-opt:disabled{cursor:not-allowed}

.quiz-feedback{background:var(--surface-2);border-radius:var(--r);padding:16px;font-size:14px;line-height:1.6;color:var(--ink-muted);display:none;margin-bottom:20px}
.quiz-feedback.show{display:block}
.feedback-label{font-weight:600;color:var(--ink);display:block;margin-bottom:4px}

/* Quiz results */
.quiz-results{text-align:center;padding:40px 0}
.results-score{font-family:var(--fd);font-size:72px;font-weight:600;color:var(--ink);line-height:1;margin-bottom:8px}
.results-label{font-size:17px;color:var(--ink-muted);margin-bottom:8px}
.results-sub{font-size:14px;color:var(--ink-faint);margin-bottom:36px;line-height:1.5}
.results-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

/* === PROGRESS VIEW === */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:32px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 10px;text-align:center}
.stat-val{font-family:var(--fd);font-size:34px;font-weight:400;color:var(--ink);line-height:1;margin-bottom:4px}
.stat-lbl{font-size:11px;font-weight:500;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.06em}

.prog-mod{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:8px}
.prog-mod-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.prog-mod-name{font-size:14px;font-weight:600}
.prog-mod-pct{font-size:12px;color:var(--ink-muted)}

/* === SETTINGS VIEW === */
.settings-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px}
.settings-title{font-size:14px;font-weight:600;margin-bottom:4px}
.settings-desc{font-size:13px;color:var(--ink-muted);margin-bottom:16px;line-height:1.55}

/* Install banner */
.install-banner{background:var(--accent-dim);border:1.5px solid rgba(59,0,240,.2);border-radius:var(--r);padding:16px;margin-bottom:20px;display:none;align-items:center;gap:14px}
.install-banner.show{display:flex}
.install-banner p{font-size:13px;color:var(--accent-text);line-height:1.5;flex:1}
</style>
</head>
<body>
<div id="app">

<!-- Sidebar (desktop) -->
<nav class="sidebar" role="navigation" aria-label="Hauptnavigation">
  <div class="sidebar-logo">MindFrame</div>
  <div class="sidebar-nav">
    <button class="nav-btn active" data-nav="home">
      <span class="nav-icon" aria-hidden="true">⌂</span>Übersicht
    </button>
    <button class="nav-btn" data-nav="progress">
      <span class="nav-icon" aria-hidden="true">◎</span>Fortschritt
    </button>
    <button class="nav-btn" data-nav="settings">
      <span class="nav-icon" aria-hidden="true">⚙</span>Einstellungen
    </button>
  </div>
  <div class="sidebar-footer">
    <div class="sec-label" style="margin-bottom:8px">Sprache</div>
    <div class="lang-row">
      <button class="lang-btn active" id="s-lang-de" onclick="APP.setLang('de')" aria-pressed="true">DE</button>
      <button class="lang-btn" id="s-lang-en" onclick="APP.setLang('en')" aria-pressed="false">EN</button>
    </div>
  </div>
</nav>

<!-- Main -->
<main class="main-wrap" id="main">
  <div class="reading-bar" id="reading-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Lesefortschritt"></div>

  <!-- Home -->
  <section id="view-home" class="view active" aria-label="Übersicht">
    <div class="home-header">
      <h1 class="home-greeting" id="home-greeting">Willkommen zurück.</h1>
      <p class="home-sub" id="home-sub">Dein Kurs in Behavioral Science.</p>
      <div class="streak-chip">
        <span aria-hidden="true">🔥</span>
        <span id="streak-num">0</span>
        <span id="streak-lbl"> Tage Streak</span>
      </div>
    </div>
    <div id="continue-section"></div>
    <p class="sec-label" id="mod-label">Module</p>
    <div class="mod-grid" id="mod-grid">
      <div class="loading"><div class="spinner" aria-hidden="true"></div>Lädt…</div>
    </div>
  </section>

  <!-- Module -->
  <section id="view-module" class="view" aria-label="Modul">
    <button class="back-btn" id="mod-back" onclick="APP.nav('home')">
      ← <span id="mod-back-lbl">Zurück</span>
    </button>
    <div id="mod-content"></div>
  </section>

  <!-- Lesson -->
  <section id="view-lesson" class="view" aria-label="Lektion">
    <div id="lesson-content"></div>
  </section>

  <!-- Quiz -->
  <section id="view-quiz" class="view" aria-label="Quiz">
    <div id="quiz-content"></div>
  </section>

  <!-- Progress -->
  <section id="view-progress" class="view" aria-labelledby="prog-h">
    <h1 class="view-h" id="prog-h">Fortschritt</h1>
    <div id="progress-content"></div>
  </section>

  <!-- Settings -->
  <section id="view-settings" class="view" aria-labelledby="settings-h">
    <h1 class="view-h" id="settings-h">Einstellungen</h1>
    <div id="settings-content"></div>
  </section>
</main>

<!-- Bottom nav (mobile) -->
<nav class="bottom-nav" role="navigation" aria-label="Navigation">
  <button class="bn-btn active" data-nav="home" aria-label="Übersicht">
    <span class="bn-icon" aria-hidden="true">⌂</span>
    <span id="bn-home">Home</span>
  </button>
  <button class="bn-btn" data-nav="progress" aria-label="Fortschritt">
    <span class="bn-icon" aria-hidden="true">◎</span>
    <span id="bn-prog">Fortschritt</span>
  </button>
  <button class="bn-btn" data-nav="settings" aria-label="Einstellungen">
    <span class="bn-icon" aria-hidden="true">⚙</span>
    <span id="bn-set">Settings</span>
  </button>
</nav>
</div>

<div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const CFG = {
  curriculumUrl: 'data/curriculum.json',
  unlockThreshold: 0.6, // 60% of prev module to unlock next
};

// ============================================================
// STATE
// ============================================================
const S = {
  lang: localStorage.getItem('mf_lang') || 'de',
  view: 'home',
  curriculum: null,
  currentModule: null,   // full module data object
  currentLesson: null,   // lesson object
  progress: JSON.parse(localStorage.getItem('mf_progress') || '{}'),
  streak: parseInt(localStorage.getItem('mf_streak') || '0'),
  lastActivity: localStorage.getItem('mf_last_activity') || null,
  quizIndex: 0,
  quizAnswers: [],
  deferredInstall: null,
};

// ============================================================
// STORAGE
// ============================================================
function saveProgress() {
  localStorage.setItem('mf_progress', JSON.stringify(S.progress));
}

function getLP(lessonId) {
  return S.progress[lessonId] || { completed: false, quizScore: null, missionDone: false };
}

function setLP(lessonId, patch) {
  S.progress[lessonId] = { ...getLP(lessonId), ...patch };
  saveProgress();
}

// ============================================================
// STREAK
// ============================================================
function updateStreak() {
  const today = new Date().toISOString().split('T')[0];
  const last = S.lastActivity;
  if (!last) return;
  const diff = (new Date(today) - new Date(last)) / 86400000;
  if (diff > 1) { S.streak = 0; localStorage.setItem('mf_streak', 0); }
}

function markActivity() {
  const today = new Date().toISOString().split('T')[0];
  if (S.lastActivity === today) return;
  const last = S.lastActivity;
  if (last) {
    const diff = (new Date(today) - new Date(last)) / 86400000;
    S.streak = diff === 1 ? S.streak + 1 : 1;
  } else {
    S.streak = 1;
  }
  S.lastActivity = today;
  localStorage.setItem('mf_streak', S.streak);
  localStorage.setItem('mf_last_activity', today);
  document.getElementById('streak-num').textContent = S.streak;
}

// ============================================================
// LANGUAGE
// ============================================================
function t(de, en) { return S.lang === 'de' ? de : en; }

function applyLang(lang) {
  S.lang = lang;
  localStorage.setItem('mf_lang', lang);
  document.documentElement.lang = lang;

  // Sidebar lang buttons
  document.getElementById('s-lang-de')?.classList.toggle('active', lang === 'de');
  document.getElementById('s-lang-en')?.classList.toggle('active', lang === 'en');
  document.getElementById('s-lang-de')?.setAttribute('aria-pressed', lang === 'de');
  document.getElementById('s-lang-en')?.setAttribute('aria-pressed', lang === 'en');

  // Static text that doesn't re-render
  document.getElementById('home-greeting').textContent = t('Willkommen zurück.', 'Welcome back.');
  document.getElementById('home-sub').textContent = t('Dein Kurs in Behavioral Science.', 'Your Behavioral Science course.');
  document.getElementById('streak-lbl').textContent = t(' Tage Streak', ' day streak');
  document.getElementById('mod-label').textContent = t('Module', 'Modules');
  document.getElementById('mod-back-lbl').textContent = t('Zurück', 'Back');
  document.getElementById('prog-h').textContent = t('Fortschritt', 'Progress');
  document.getElementById('settings-h').textContent = t('Einstellungen', 'Settings');

  // Sidebar nav labels
  const navBtns = document.querySelectorAll('.nav-btn');
  const navLabels = [
    t('Übersicht', 'Overview'),
    t('Fortschritt', 'Progress'),
    t('Einstellungen', 'Settings'),
  ];
  navBtns.forEach((btn, i) => {
    if (navLabels[i]) btn.lastChild.textContent = navLabels[i];
  });

  // Bottom nav labels
  document.getElementById('bn-home').textContent = t('Home', 'Home');
  document.getElementById('bn-prog').textContent = t('Fortschritt', 'Progress');
  document.getElementById('bn-set').textContent = t('Settings', 'Settings');
}

// ============================================================
// NAVIGATION
// ============================================================
const APP = {

  setLang(lang) {
    applyLang(lang);
    // Re-render current view
    const view = S.view;
    if (view === 'home') renderHome();
    else if (view === 'module' && S.currentModule) renderModule(S.currentModule);
    else if (view === 'lesson' && S.currentLesson) renderLesson(S.currentLesson);
    else if (view === 'progress') renderProgress();
    else if (view === 'settings') renderSettings();
  },

  nav(view) {
    S.view = view;
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    const el = document.getElementById(`view-${view}`);
    if (el) { el.classList.add('active'); }

    // Update nav active states
    document.querySelectorAll('[data-nav]').forEach(btn => {
      const active = btn.dataset.nav === view;
      btn.classList.toggle('active', active);
      if (active) btn.setAttribute('aria-current', 'page');
      else btn.removeAttribute('aria-current');
    });

    // Reading bar
    const bar = document.getElementById('reading-bar');
    bar.style.display = view === 'lesson' ? 'block' : 'none';
    if (view !== 'lesson') bar.style.transform = 'scaleX(0)';

    window.scrollTo({ top: 0, behavior: 'instant' });

    // Render
    if (view === 'home') renderHome();
    if (view === 'progress') renderProgress();
    if (view === 'settings') renderSettings();
  },

  async openModule(moduleId) {
    document.getElementById('mod-content').innerHTML = loadingHTML();
    APP.nav('module');
    const modMeta = S.curriculum?.modules.find(m => m.id === moduleId);
    if (!modMeta) return;
    // Load if not cached
    if (!modMeta._data) {
      try {
        const res = await fetch(modMeta.file);
        modMeta._data = await res.json();
      } catch {
        document.getElementById('mod-content').innerHTML = errorHTML();
        return;
      }
    }
    S.currentModule = modMeta._data;
    renderModule(S.currentModule);
  },

  async openLesson(lessonId) {
    if (!S.currentModule) return;
    const lesson = S.currentModule.lessons.find(l => l.id === lessonId);
    if (!lesson) return;
    S.currentLesson = lesson;
    APP.nav('lesson');
    renderLesson(lesson);
  },

  startQuiz() {
    if (!S.currentLesson) return;
    S.quizIndex = 0;
    S.quizAnswers = [];
    APP.nav('quiz');
    renderQuizQ();
  },

  toggleMission(lessonId) {
    const cur = getLP(lessonId);
    const done = !cur.missionDone;
    setLP(lessonId, { missionDone: done });
    const cb = document.getElementById('mission-cb');
    if (cb) {
      cb.classList.toggle('done', done);
      cb.setAttribute('aria-pressed', done);
    }
    if (done) showToast(t('Mission erledigt 🏁', 'Mission done 🏁'));
  },

  markComplete(lessonId) {
    setLP(lessonId, { completed: true });
    markActivity();
    showToast(t('Lektion abgeschlossen ✓', 'Lesson complete ✓'));
    APP.nav('module');
    if (S.currentModule) renderModule(S.currentModule);
  },

  answerQuiz(optIndex) {
    const quiz = S.currentLesson?.quiz;
    if (!quiz) return;
    const q = quiz.questions[S.quizIndex];
    const correct = q.correctIndex;
    const isCorrect = optIndex === correct;
    S.quizAnswers.push(isCorrect);

    // Disable & highlight options
    document.querySelectorAll('.quiz-opt').forEach((btn, i) => {
      btn.disabled = true;
      if (i === correct) btn.classList.add('correct');
      if (i === optIndex && !isCorrect) btn.classList.add('wrong');
    });

    // Show feedback
    const fb = document.getElementById('quiz-fb');
    const exp = S.lang === 'de' ? q.explanationDe : q.explanationEn;
    fb.innerHTML = `<span class="feedback-label">${isCorrect ? t('Richtig! ✓', 'Correct! ✓') : t('Nicht ganz.', 'Not quite.')}</span>${exp}`;
    fb.classList.add('show');

    // Show next button
    const nb = document.getElementById('next-btn');
    if (nb) nb.style.display = 'inline-flex';
  },

  nextQ() {
    S.quizIndex++;
    const quiz = S.currentLesson?.quiz;
    if (!quiz || S.quizIndex >= quiz.questions.length) {
      renderQuizResults();
    } else {
      renderQuizQ();
    }
  },

  resetProgress() {
    if (!confirm(t('Wirklich? Alle Fortschritte werden gelöscht.', 'Really? All progress will be deleted.'))) return;
    S.progress = {};
    S.streak = 0;
    S.lastActivity = null;
    localStorage.removeItem('mf_progress');
    localStorage.removeItem('mf_streak');
    localStorage.removeItem('mf_last_activity');
    document.getElementById('streak-num').textContent = '0';
    renderSettings();
    showToast(t('Fortschritt gelöscht.', 'Progress deleted.'));
  },

  installPWA() {
    if (S.deferredInstall) {
      S.deferredInstall.prompt();
      S.deferredInstall.userChoice.then(() => {
        S.deferredInstall = null;
        document.getElementById('install-banner')?.classList.remove('show');
      });
    }
  },
};

// ============================================================
// DATA LOADING
// ============================================================
async function loadCurriculum() {
  try {
    const res = await fetch(CFG.curriculumUrl);
    S.curriculum = await res.json();
    // Preload module 01 for continue card
    const first = S.curriculum.modules[0];
    if (first && !first._data) {
      try {
        const r = await fetch(first.file);
        first._data = await r.json();
        if (!S.currentModule) S.currentModule = first._data;
      } catch { /* silent */ }
    }
    renderHome();
  } catch {
    document.getElementById('mod-grid').innerHTML = errorHTML();
  }
}

// ============================================================
// RENDER: HOME
// ============================================================
function renderHome() {
  document.getElementById('streak-num').textContent = S.streak;

  // Continue card
  const continueEl = document.getElementById('continue-section');
  const next = findNextLesson();
  if (next) {
    continueEl.innerHTML = `
      <button class="continue-card" onclick="APP.openModule('${next.moduleId}').then(()=>APP.openLesson('${next.lesson.id}'))" aria-label="${t('Weiter lernen', 'Continue learning')}: ${t(next.lesson.titleDe, next.lesson.titleEn)}">
        <div>
          <div class="cc-label">${t('Weiter lernen', 'Continue learning')}</div>
          <div class="cc-title">${t(next.lesson.titleDe, next.lesson.titleEn)}</div>
          <div class="cc-meta">
            <span>${t(next.modTitleDe, next.modTitleEn)}</span>
            <span>·</span>
            <span>${next.lesson.durationMin} Min.</span>
          </div>
        </div>
        <span class="cc-arrow" aria-hidden="true">→</span>
      </button>`;
  } else {
    continueEl.innerHTML = `
      <div class="continue-card" style="cursor:default">
        <div>
          <div class="cc-label">${t('Alles erledigt', 'All done')}</div>
          <div class="cc-title">${t('Alle verfügbaren Lektionen abgeschlossen.', 'All available lessons completed.')}</div>
        </div>
        <span class="cc-arrow">✓</span>
      </div>`;
  }

  // Module grid
  if (!S.curriculum) return;
  const grid = document.getElementById('mod-grid');
  grid.innerHTML = S.curriculum.modules.map((mod, i) => {
    const locked = isModuleLocked(mod, i);
    // Calc progress if loaded
    let pct = 0;
    if (mod._data) {
      const done = mod._data.lessons.filter(l => getLP(l.id).completed).length;
      pct = Math.round((done / mod._data.lessons.length) * 100);
    }
    return `
      <button class="mod-card ${locked ? 'locked' : ''}" ${locked ? 'aria-disabled="true"' : `onclick="APP.openModule('${mod.id}')"`}>
        <span class="mod-icon" aria-hidden="true">${mod.icon}</span>
        <div class="mod-title">${t(mod.titleDe, mod.titleEn)}</div>
        <div class="mod-meta">${mod.lessonCount} ${t('Lektionen', 'lessons')} · ${Math.round(mod.estimatedHours * 60)} Min.</div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      </button>`;
  }).join('');
}

function findNextLesson() {
  if (!S.curriculum) return null;
  for (const mod of S.curriculum.modules) {
    if (!mod._data) continue;
    for (const lesson of mod._data.lessons) {
      if (!getLP(lesson.id).completed) {
        return { lesson, moduleId: mod.id, modTitleDe: mod.titleDe, modTitleEn: mod.titleEn };
      }
    }
  }
  return null;
}

function isModuleLocked(mod, index) {
  if (index === 0) return false;
  if (!mod.lockedUntil || !S.curriculum) return false;
  const prevMod = S.curriculum.modules.find(m => m.id === mod.lockedUntil.moduleId);
  if (!prevMod?._data) return true;
  const total = prevMod._data.lessons.length;
  const done = prevMod._data.lessons.filter(l => getLP(l.id).completed).length;
  return (done / total) < mod.lockedUntil.pct / 100;
}

// ============================================================
// RENDER: MODULE
// ============================================================
function renderModule(modData) {
  const el = document.getElementById('mod-content');
  if (!el) return;
  const title = t(modData.titleDe, modData.titleEn);
  const desc = t(modData.descriptionDe, modData.descriptionEn);

  el.innerHTML = `
    <div class="mod-header">
      <div class="mod-icon-lg" aria-hidden="true">${modData.icon}</div>
      <h1 class="mod-title-lg">${title}</h1>
      <p class="mod-desc">${desc}</p>
    </div>
    <p class="sec-label">${t('Lektionen', 'Lessons')}</p>
    <div class="lesson-list">
      ${modData.lessons.map((l, i) => {
        const lp = getLP(l.id);
        const ltitle = t(l.titleDe, l.titleEn);
        return `
          <button class="lesson-item ${lp.completed ? 'done' : ''}" onclick="APP.openLesson('${l.id}')" aria-label="${ltitle}${lp.completed ? ' — ' + t('Abgeschlossen', 'Completed') : ''}">
            <div class="l-num" aria-hidden="true">${lp.completed ? '✓' : i + 1}</div>
            <div class="l-info">
              <div class="l-title">${ltitle}</div>
              <div class="l-meta">
                <span>⏱ ${l.durationMin} Min.</span>
                ${diffDots(l.difficulty || 1)}
                ${lp.missionDone ? `<span class="badge purple">🏁 ${t('Mission', 'Mission')}</span>` : ''}
                ${lp.quizScore !== null ? `<span class="badge green">🧠 ${lp.quizScore}/3</span>` : ''}
              </div>
            </div>
            <span aria-hidden="true" style="color:var(--ink-faint);font-size:16px">›</span>
          </button>`;
      }).join('')}
    </div>`;
}

// ============================================================
// RENDER: LESSON
// ============================================================
function renderLesson(lesson) {
  const el = document.getElementById('lesson-content');
  if (!el || !S.currentModule) return;
  const lang = S.lang;
  const content = lang === 'de' ? lesson.contentDe : lesson.contentEn;
  const title = lang === 'de' ? lesson.titleDe : lesson.titleEn;
  const lp = getLP(lesson.id);
  const idx = S.currentModule.lessons.findIndex(l => l.id === lesson.id);
  const total = S.currentModule.lessons.length;
  const modTitle = t(S.currentModule.titleDe, S.currentModule.titleEn);
  const diffLabel = ['', t('Einfach', 'Easy'), t('Mittel', 'Medium'), t('Anspruchsvoll', 'Advanced')][lesson.difficulty || 1];

  el.innerHTML = `
    <div class="lesson-nav">
      <button class="back-btn" onclick="APP.nav('module');renderModule(S.currentModule)">
        ← ${t('Zurück', 'Back')}
      </button>
      <span class="lesson-counter">${idx + 1} / ${total}</span>
    </div>

    <div class="lesson-breadcrumb">${modTitle}</div>
    <h1 class="lesson-title">${title}</h1>
    <p class="lesson-summary">${content.summary}</p>

    <div class="lesson-meta-bar">
      <div class="l-meta-item"><span aria-hidden="true">⏱</span>${lesson.durationMin} ${t('Min. Lesezeit', 'min read')}</div>
      <div class="l-meta-item">${diffDots(lesson.difficulty || 1)} ${diffLabel}</div>
    </div>

    <div class="lesson-body">
      ${content.body.map(p => `<p>${p}</p>`).join('')}
    </div>

    <!-- Example -->
    <div class="l-section">
      <p class="sec-label">${t('Beispiel', 'Example')}</p>
      <div class="example-card">
        <div class="example-title">${content.example.title}</div>
        <div class="example-body">${content.example.text}</div>
      </div>
    </div>

    <!-- Reference -->
    <div class="l-section">
      <p class="sec-label">${t('Akademische Quelle', 'Academic Reference')}</p>
      <div class="ref-block">
        <div class="ref-author">${content.reference.author} (${content.reference.year})</div>
        <div class="ref-title">${content.reference.title}</div>
        <div class="ref-note">${content.reference.note}</div>
      </div>
    </div>

    <!-- Field Mission -->
    <div class="l-section">
      <p class="sec-label">${t('Field Mission', 'Field Mission')}</p>
      <div class="mission-card">
        <div class="mission-top">
          <button class="mission-check ${lp.missionDone ? 'done' : ''}"
            id="mission-cb"
            onclick="APP.toggleMission('${lesson.id}')"
            aria-label="${t('Mission abhaken', 'Mark mission done')}"
            aria-pressed="${lp.missionDone}">
          </button>
          <div class="mission-check-title">${content.fieldMission.title}</div>
        </div>
        <div class="mission-desc">${content.fieldMission.description}</div>
      </div>
    </div>

    <!-- CTA -->
    <div class="lesson-cta">
      ${lesson.quiz?.questions?.length ? `
        <button class="btn-primary" onclick="APP.startQuiz()">
          ${t('Quiz starten', 'Start Quiz')} →
        </button>` : ''}
      ${!lp.completed ? `
        <button class="btn-secondary" onclick="APP.markComplete('${lesson.id}')">
          ${t('Abschließen', 'Mark complete')}
        </button>` : `
        <span style="font-size:14px;color:var(--correct);display:flex;align-items:center;gap:6px;font-weight:600">✓ ${t('Abgeschlossen', 'Completed')}</span>`}
    </div>`;

  // Setup reading progress bar
  markActivity();
}

// ============================================================
// RENDER: QUIZ
// ============================================================
function renderQuizQ() {
  const el = document.getElementById('quiz-content');
  if (!el || !S.currentLesson?.quiz) return;
  const quiz = S.currentLesson.quiz;
  const i = S.quizIndex;
  if (i >= quiz.questions.length) { renderQuizResults(); return; }
  const q = quiz.questions[i];
  const qText = S.lang === 'de' ? q.questionDe : q.questionEn;
  const opts = S.lang === 'de' ? q.optionsDe : q.optionsEn;
  const pct = Math.round((i / quiz.questions.length) * 100);

  el.innerHTML = `
    <div class="quiz-back">
      <button class="back-btn" onclick="APP.nav('lesson');renderLesson(S.currentLesson)">
        ← ${t('Zur Lektion', 'Back to lesson')}
      </button>
    </div>
    <div class="quiz-prog-bar"><div class="quiz-prog-fill" style="width:${pct}%"></div></div>
    <div class="quiz-counter">${t('Frage', 'Question')} ${i + 1} ${t('von', 'of')} ${quiz.questions.length}</div>

    <p class="quiz-q" style="margin-top:20px">${qText}</p>

    <div class="quiz-options" role="group" aria-label="${t('Antwortmöglichkeiten', 'Answer options')}">
      ${opts.map((o, oi) => `
        <button class="quiz-opt" onclick="APP.answerQuiz(${oi})">
          ${String.fromCharCode(65 + oi)}. ${o}
        </button>`).join('')}
    </div>

    <div class="quiz-feedback" id="quiz-fb" role="alert"></div>

    <button class="btn-primary" id="next-btn" style="display:none" onclick="APP.nextQ()">
      ${i + 1 < quiz.questions.length ? t('Nächste Frage →', 'Next question →') : t('Ergebnis →', 'See result →')}
    </button>`;
}

function renderQuizResults() {
  const el = document.getElementById('quiz-content');
  if (!el) return;
  const correct = S.quizAnswers.filter(Boolean).length;
  const total = S.quizAnswers.length;
  const pct = Math.round((correct / total) * 100);
  const scoreLabel = pct >= 80 ? t('Ausgezeichnet!', 'Excellent!') : pct >= 60 ? t('Gut gemacht!', 'Good job!') : t('Weiter üben!', 'Keep practicing!');
  const scoreSub = pct >= 80
    ? t('Du hast diese Lektion gemeistert.', 'You\'ve mastered this lesson.')
    : t('Lies die Lektion nochmal und versuche es erneut.', 'Review the lesson and try again.');

  if (S.currentLesson) {
    setLP(S.currentLesson.id, { completed: true, quizScore: correct });
    markActivity();
  }

  el.innerHTML = `
    <div class="quiz-results">
      <div class="results-score" aria-label="${correct} ${t('von', 'of')} ${total} ${t('Richtig', 'correct')}">${correct}/${total}</div>
      <div class="results-label">${scoreLabel}</div>
      <div class="results-sub">${scoreSub}</div>
      <div class="results-actions">
        <button class="btn-primary" onclick="APP.nav('module');renderModule(S.currentModule)">
          ${t('Weiter', 'Continue')} →
        </button>
        ${pct < 100 ? `<button class="btn-secondary" onclick="S.quizIndex=0;S.quizAnswers=[];renderQuizQ()">${t('Nochmal', 'Retry')}</button>` : ''}
      </div>
    </div>`;

  showToast(`${t('Quiz abgeschlossen', 'Quiz done')} · ${correct}/${total}`);
}

// ============================================================
// RENDER: PROGRESS
// ============================================================
function renderProgress() {
  const el = document.getElementById('progress-content');
  if (!el) return;
  let totalLessons = 0, doneCount = 0, missions = 0;
  Object.values(S.progress).forEach(p => {
    if (p.completed) doneCount++;
    if (p.missionDone) missions++;
  });
  if (S.curriculum) S.curriculum.modules.forEach(m => { totalLessons += m.lessonCount; });

  el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val">${doneCount}</div>
        <div class="stat-lbl">${t('Lektionen', 'Lessons')}</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${S.streak}</div>
        <div class="stat-lbl">${t('Streak', 'Streak')}</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${missions}</div>
        <div class="stat-lbl">${t('Missions', 'Missions')}</div>
      </div>
    </div>

    ${S.curriculum ? `
      <p class="sec-label" style="margin-bottom:12px">${t('Module', 'Modules')}</p>
      ${S.curriculum.modules.map(mod => {
        const modDone = mod._data
          ? mod._data.lessons.filter(l => getLP(l.id).completed).length
          : 0;
        const modTotal = mod.lessonCount;
        const modPct = Math.round((modDone / modTotal) * 100);
        return `
          <div class="prog-mod">
            <div class="prog-mod-head">
              <div class="prog-mod-name">${mod.icon} ${t(mod.titleDe, mod.titleEn)}</div>
              <div class="prog-mod-pct">${modDone}/${modTotal}</div>
            </div>
            <div class="prog-bar"><div class="prog-fill" style="width:${modPct}%"></div></div>
          </div>`;
      }).join('')}
    ` : ''}

    ${doneCount === 0 ? `
      <div class="empty" style="padding-top:16px">
        <div class="empty-icon">🌱</div>
        <div class="empty-title">${t('Noch keine Fortschritte', 'No progress yet')}</div>
        <div class="empty-desc">${t('Starte deine erste Lektion, um hier Fortschritte zu sehen.', 'Complete your first lesson to see progress here.')}</div>
      </div>` : ''}`;
}

// ============================================================
// RENDER: SETTINGS
// ============================================================
function renderSettings() {
  const el = document.getElementById('settings-content');
  if (!el) return;
  el.innerHTML = `
    <div class="settings-card">
      <div class="settings-title">${t('Sprache', 'Language')}</div>
      <div class="settings-desc">${t('Inhaltssprache für alle Lektionen und die App.', 'Content language for all lessons and the app.')}</div>
      <div class="lang-row">
        <button class="lang-btn ${S.lang === 'de' ? 'active' : ''}" onclick="APP.setLang('de')" aria-pressed="${S.lang === 'de'}">Deutsch</button>
        <button class="lang-btn ${S.lang === 'en' ? 'active' : ''}" onclick="APP.setLang('en')" aria-pressed="${S.lang === 'en'}">English</button>
      </div>
    </div>

    <div class="settings-card">
      <div class="settings-title">${t('Fortschritt zurücksetzen', 'Reset progress')}</div>
      <div class="settings-desc">${t('Lernfortschritt, Streak und Missions-Daten löschen. Kann nicht rückgängig gemacht werden.', 'Delete learning progress, streak, and mission data. Cannot be undone.')}</div>
      <button class="btn-secondary btn-danger" onclick="APP.resetProgress()">
        ${t('Alles löschen', 'Delete all')}
      </button>
    </div>

    <div class="settings-card" style="opacity:.65">
      <div class="settings-title">MindFrame v1.0</div>
      <div class="settings-desc" style="margin-bottom:0">${t('Behavioral Science Lernapp · Populärwissenschaftlich mit akademischen Referenzen.', 'Behavioral Science learning app · Popular science with academic references.')}</div>
    </div>`;
}

// ============================================================
// HELPERS
// ============================================================
function diffDots(level) {
  let html = '<span class="diff-dots" aria-hidden="true">';
  for (let i = 1; i <= 3; i++) html += `<span class="diff-dot ${i <= level ? 'on' : ''}"></span>`;
  return html + '</span>';
}

function loadingHTML() {
  return `<div class="loading"><div class="spinner" aria-hidden="true"></div>${t('Lädt…', 'Loading…')}</div>`;
}

function errorHTML() {
  return `<div class="empty"><div class="empty-icon">⚠</div><div class="empty-title">${t('Laden fehlgeschlagen', 'Load failed')}</div><div class="empty-desc">${t('Bitte Seite neu laden.', 'Please reload the page.')}</div></div>`;
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ============================================================
// SCROLL → READING PROGRESS BAR
// ============================================================
window.addEventListener('scroll', () => {
  if (S.view !== 'lesson') return;
  const bar = document.getElementById('reading-bar');
  const h = document.documentElement.scrollHeight - window.innerHeight;
  const pct = h > 0 ? Math.min(window.scrollY / h, 1) : 0;
  bar.style.transform = `scaleX(${pct})`;
  bar.setAttribute('aria-valuenow', Math.round(pct * 100));
}, { passive: true });

// ============================================================
// NAV CLICK BINDING
// ============================================================
document.querySelectorAll('[data-nav]').forEach(btn => {
  btn.addEventListener('click', () => APP.nav(btn.dataset.nav));
});

// ============================================================
// PWA INSTALL
// ============================================================
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  S.deferredInstall = e;
  document.getElementById('install-banner')?.classList.add('show');
});

// ============================================================
// SERVICE WORKER
// ============================================================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ============================================================
// INIT
// ============================================================
updateStreak();
applyLang(S.lang);
loadCurriculum();
</script>
</body>
</html>
